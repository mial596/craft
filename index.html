class ArcadiaBridge {
  constructor(){
    this.cb={};
    window.addEventListener('message',e=>{
      const{type,requestId:id,payload}=e.data||{};
      if(id&&this.cb[id]){this.cb[id](payload);delete this.cb[id];}
    });
  }
  _s(type,payload={}){
    return new Promise(res=>{
      const id=Date.now().toString(36)+Math.random().toString(36).slice(2);
      this.cb[id]=res;
      window.parent.postMessage({type,payload,requestId:id},'*');
      setTimeout(()=>{if(this.cb[id]){this.cb[id]({success:false,offline:true});delete this.cb[id];}},1800);
    });
  }
  login(){return this._s('ARCADIA_LOGIN');}
  save(d){return this._s('ARCADIA_SAVE_DATA',{data:d});}
  load(){return this._s('ARCADIA_LOAD_DATA');}
  unlock(id){return this._s('ARCADIA_UNLOCK_ACHIEVEMENT',{achievementId:id});}
  setRank(v){return this._s('ARCADIA_UPDATE_RANKING',{value:v});}
  onSaveReq(cb){window.addEventListener('message',e=>{if(e.data?.type==='ARCADIA_REQUEST_SAVE')cb();});}
}
window.Arcadia=new ArcadiaBridge();

//  AUDIO ENGINE  (Web Audio API, no external files)
// ════════════════════════════════════════════════════════
const Audio={
  ctx:null, enabled:true, musicGain:null, sfxGain:null,
  bgNodes:[], bgPlaying:false,

  init(){
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.musicGain=this.ctx.createGain(); this.musicGain.gain.value=0.18;
      this.musicGain.connect(this.ctx.destination);
      this.sfxGain=this.ctx.createGain(); this.sfxGain.gain.value=0.55;
      this.sfxGain.connect(this.ctx.destination);
    }catch(e){this.enabled=false;}
  },

  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},

  // Generate ambient background music procedurally
  startMusic(){
    if(!this.ctx||!this.enabled||this.bgPlaying)return;
    this.bgPlaying=true;
    this._playAmbient();
  },

  _playAmbient(){
    if(!this.enabled||!this.bgPlaying)return;
    const ctx=this.ctx, g=this.musicGain;
    const t=ctx.currentTime;

    // Gentle pad chord
    const notes=[261.6,329.6,392,523.3]; // C major chord
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const og=ctx.createGain();
      osc.type='sine';
      osc.frequency.value=freq*(1+Math.random()*0.004);
      og.gain.setValueAtTime(0,t);
      og.gain.linearRampToValueAtTime(0.06/(i+1),t+2);
      og.gain.linearRampToValueAtTime(0,t+18);
      osc.connect(og); og.connect(g);
      osc.start(t); osc.stop(t+18);
    });

    // Gentle low drone
    const drone=ctx.createOscillator();
    const dg=ctx.createGain();
    drone.type='triangle';
    drone.frequency.value=65+Math.random()*10;
    dg.gain.setValueAtTime(0,t);
    dg.gain.linearRampToValueAtTime(0.04,t+3);
    dg.gain.linearRampToValueAtTime(0,t+18);
    drone.connect(dg); dg.connect(g);
    drone.start(t); drone.stop(t+18);

    // Bird chirp occasionally
    if(Math.random()<0.6) this._bird(t+2+Math.random()*8);
    if(Math.random()<0.4) this._bird(t+12+Math.random()*5);

    setTimeout(()=>{ if(this.bgPlaying)this._playAmbient(); }, 16000);
  },

  _bird(when){
    if(!this.ctx||!this.enabled)return;
    const ctx=this.ctx, g=this.sfxGain;
    const osc=ctx.createOscillator();
    const og=ctx.createGain();
    osc.type='sine';
    const f=800+Math.random()*800;
    osc.frequency.setValueAtTime(f,when);
    osc.frequency.linearRampToValueAtTime(f*1.3,when+0.1);
    osc.frequency.linearRampToValueAtTime(f*0.9,when+0.2);
    og.gain.setValueAtTime(0,when);
    og.gain.linearRampToValueAtTime(0.12,when+0.05);
    og.gain.linearRampToValueAtTime(0,when+0.25);
    osc.connect(og); og.connect(g);
    osc.start(when); osc.stop(when+0.3);
  },

  stopMusic(){
    this.bgPlaying=false;
  },

  // SFX
  sfx(type){
    if(!this.ctx||!this.enabled)return;
    this.resume();
    const ctx=this.ctx, g=this.sfxGain, t=ctx.currentTime;
    switch(type){
      case 'gather':{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='triangle'; o.frequency.setValueAtTime(440,t); o.frequency.linearRampToValueAtTime(660,t+.08);
        og.gain.setValueAtTime(0,t); og.gain.linearRampToValueAtTime(.25,t+.02); og.gain.linearRampToValueAtTime(0,t+.15);
        o.connect(og);og.connect(g);o.start(t);o.stop(t+.2);break;
      }
      case 'break':{
        // Short crack noise
        const buf=ctx.createBuffer(1,ctx.sampleRate*.15,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
        const src=ctx.createBufferSource(),bg=ctx.createGain();
        bg.gain.value=0.35; src.buffer=buf;
        src.connect(bg);bg.connect(g);src.start(t);break;
      }
      case 'craft':{
        [0,0.12,0.24].forEach((delay,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='square'; o.frequency.value=523+(i*131);
          og.gain.setValueAtTime(0,t+delay); og.gain.linearRampToValueAtTime(.15,t+delay+.03); og.gain.linearRampToValueAtTime(0,t+delay+.12);
          o.connect(og);og.connect(g);o.start(t+delay);o.stop(t+delay+.15);
        });break;
      }
      case 'eat':{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.linearRampToValueAtTime(440,t+.2);
        og.gain.setValueAtTime(0,t); og.gain.linearRampToValueAtTime(.2,t+.02); og.gain.linearRampToValueAtTime(0,t+.22);
        o.connect(og);og.connect(g);o.start(t);o.stop(t+.25);break;
      }
      case 'levelup':{
        [523,659,784,1047].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='triangle'; o.frequency.value=f;
          og.gain.setValueAtTime(0,t+i*.12); og.gain.linearRampToValueAtTime(.22,t+i*.12+.04); og.gain.linearRampToValueAtTime(0,t+i*.12+.18);
          o.connect(og);og.connect(g);o.start(t+i*.12);o.stop(t+i*.12+.22);
        });break;
      }
      case 'step':{
        const o=ctx.createOscillator(),og=ctx.createGain();
        o.type='sine'; o.frequency.value=60+Math.random()*40;
        og.gain.setValueAtTime(0,t); og.gain.linearRampToValueAtTime(.05,t+.02); og.gain.linearRampToValueAtTime(0,t+.08);
        o.connect(og);og.connect(g);o.start(t);o.stop(t+.1);break;
      }
      case 'splash':{
        const buf=ctx.createBuffer(1,ctx.sampleRate*.2,ctx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
        const src=ctx.createBufferSource(),bg2=ctx.createGain();
        bg2.gain.value=0.2;src.buffer=buf;src.connect(bg2);bg2.connect(g);src.start(t);break;
      }
      case 'mp_join':{
        [660,880].forEach((f,i)=>{
          const o=ctx.createOscillator(),og=ctx.createGain();
          o.type='sine'; o.frequency.value=f;
          og.gain.setValueAtTime(0,t+i*.15); og.gain.linearRampToValueAtTime(.18,t+i*.15+.04); og.gain.linearRampToValueAtTime(0,t+i*.15+.2);
          o.connect(og);og.connect(g);o.start(t+i*.15);o.stop(t+i*.15+.25);
        });break;
      }
    }
  },

  toggle(){
    this.enabled=!this.enabled;
    if(this.enabled){this.bgPlaying=false;this.startMusic();}
    else{this.stopMusic();if(this.musicGain)this.musicGain.gain.value=0;}
    if(this.enabled&&this.musicGain)this.musicGain.gain.value=0.18;
    return this.enabled;
  }
};

function nh(x,y,s=0){let n=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453;return n-Math.floor(n);}
function fbm(x,y,s=0,o=6){let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=nh(x*f,y*f,s+i)*a;a*=.5;f*=2.05;}return v;}

const T={DEEP:0,WATER:1,SHORE:2,SAND:3,GRASS:4,MEADOW:5,FOREST:6,DENSE:7,MUD:8,STONE:9,MTN:10,SNOW:11,FLOWER:12,RUIN:13,VILLAGE:14};
const TC={
  0:[[18,52,110],[14,44,96],[22,60,125]],
  1:[[28,90,175],[24,80,158],[32,100,190]],
  2:[[55,118,195],[62,128,205],[48,108,183]],
  3:[[205,172,98],[192,158,85],[218,186,110]],
  4:[[62,125,52],[72,140,58],[54,112,46]],
  5:[[78,150,62],[88,164,72],[66,134,55]],
  6:[[40,86,33],[36,78,28],[46,94,38]],
  7:[[24,52,18],[20,46,14],[28,58,22]],
  8:[[66,54,36],[58,48,30],[74,62,44]],
  9:[[90,98,108],[83,90,100],[98,106,116]],
  10:[[112,120,130],[104,112,122],[122,130,140]],
  11:[[215,230,245],[206,222,238],[224,238,252]],
  12:[[78,150,62],[218,188,55],[78,150,62]],
  13:[[80,72,58],[70,62,48],[90,82,68]],
  14:[[155,125,75],[142,112,62],[165,135,82]],
};

const MW=200, MH=200;
let wMap=[], wRes=new Map();
let wCfg={seed:'',biome:'balanced',diff:1};

// Special structures
const STRUCTURES=[];

function genWorld(){
  const rawSeed=wCfg.seed||Math.random().toString(36).slice(2,10);
  wCfg.seed=rawSeed;
  const S=[...rawSeed].reduce((a,c)=>a+c.charCodeAt(0),0);
  const biasWater={balanced:.46,forest:.60,ocean:.28,desert:.70,snow:.65,swamp:.52};
  const wb=biasWater[wCfg.biome]||.46;
  const biasForest={balanced:.52,forest:.70,ocean:.45,desert:.3,snow:.55,swamp:.58};
  const fb=biasForest[wCfg.biome]||.52;

  wMap=[];
  for(let y=0;y<MH;y++){
    wMap[y]=[];
    for(let x=0;x<MW;x++){
      const h=fbm(x/40,y/40,S);
      const m=fbm(x/15,y/15,S+50);
      const ff=fbm(x/22,y/22,S+100);
      const riv=fbm(x/8,y/8,S+200); // rivers
      const ef=Math.min(x/12,y/12,(MW-x)/12,(MH-y)/12,1);
      let el=h*ef;
      // Add rivers: thin low-elevation bands
      if(Math.abs(riv-.5)<.04&&el>.3&&el<.7) el=wb-.15; // river
      let t;
      if(el<wb-.22) t=T.DEEP;
      else if(el<wb-.12) t=T.WATER;
      else if(el<wb-.04) t=T.SHORE;
      else if(el<wb) t=T.SAND;
      else if(el<wb+.05) t=(m>.62?T.MUD:T.GRASS);
      else if(el<wb+.18){
        if(wCfg.biome==='desert') t=T.SAND;
        else if(wCfg.biome==='snow') t=T.SNOW;
        else t=(ff>.72?T.FLOWER:(ff>.56?T.FOREST:T.MEADOW));
      } else if(el<wb+.32){
        if(wCfg.biome==='snow') t=T.SNOW;
        else t=(ff>fb?T.DENSE:T.FOREST);
      } else if(el<wb+.44) t=T.STONE;
      else if(el<wb+.56) t=T.MTN;
      else t=T.SNOW;
      wMap[y][x]={type:t,v:Math.floor(nh(x,y,S+300)*3)};
    }
  }
  placeResources(S);
  placeStructures(S);
}

const RT={

};

function placeResources(S){
  wRes.clear();
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++){
    const tt=wMap[y][x].type;
    const r=nh(x+.4,y+.8,S+400);
    const r2=nh(x+.7,y+.2,S+500);
    for(const[k,d] of Object.entries(RT)){
      if(d.on.includes(tt)&&r<.24&&r2<.7){
        wRes.set(`${x},${y}`,{type:k,hp:d.hp,mhp:d.hp,resp:0,anim:Math.random()*Math.PI*2,broken:false});
        break;
      }
    }
  }
}

function placeStructures(S){
  STRUCTURES.length=0;
  // Place village clusters (5–8 structures each)
  for(let attempt=0;attempt<12;attempt++){
    const vx=Math.floor(nh(attempt,0,S+600)*MW);
    const vy=Math.floor(nh(0,attempt,S+600)*MH);
    const tt=wMap[vy]?.[vx]?.type;
    if(tt===T.GRASS||tt===T.MEADOW){
      // Mark tiles as village
      for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
        const tx=vx+dx,ty=vy+dy;
        if(tx>=0&&tx<MW&&ty>=0&&ty<MH){
          if(Math.abs(dx)<=1&&Math.abs(dy)<=1) wMap[ty][tx].type=T.VILLAGE;
          wRes.delete(`${tx},${ty}`);
        }
      }
      STRUCTURES.push({type:'village',x:vx,y:vy});
    }
  }
  // Ruin patches
  for(let attempt=0;attempt<18;attempt++){
    const rx=Math.floor(nh(attempt,1,S+700)*MW);
    const ry=Math.floor(nh(1,attempt,S+700)*MH);
    const tt=wMap[ry]?.[rx]?.type;
    if(tt===T.FOREST||tt===T.GRASS||tt===T.STONE){
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        const tx=rx+dx,ty=ry+dy;
        if(tx>=0&&tx<MW&&ty>=0&&ty<MH){
          if(Math.random()<.6) wMap[ty][tx].type=T.RUIN;
          wRes.delete(`${tx},${ty}`);
          if(Math.random()<.3) wRes.set(`${tx},${ty}`,{type:'ROCK',hp:3,mhp:3,resp:0,anim:Math.random()*Math.PI*2,broken:false});
        }
      }
      STRUCTURES.push({type:'ruin',x:rx,y:ry});
    }
  }
}

  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){

    let t;
    if(el<wb-.22)t=T.DEEP; else if(el<wb-.04)t=T.WATER;

    const co=TC[t][0]; ctx.fillStyle=`rgb(${co[0]},${co[1]},${co[2]})`; ctx.fillRect(x,y,1,1);

const MP={
  active:false, session:'', myId:'', isHost:false,
  peers:new Map(),
  SYNC:500, POLL:600, TIMEOUT:9000, COLORS:['#f39c12','#3498db','#e74c3c','#9b59b6','#1abc9c','#ff7043','#ffd700'],
  syncT:null, pollT:null, lastCloud:0,

  lk(id){return `wc_p_${this.session}_${id}`;},
  sk(){return `wc_s_${this.session}`;},
  wk(){return `wc_w_${this.session}`;}, // world data key

  init(session,myId,isHost){
    this.session=session; this.myId=myId; this.isHost=isHost;
    this.active=true;
    const ci=Math.abs([...myId].reduce((a,c)=>a+c.charCodeAt(0),0))%this.COLORS.length;
    this.myColor=this.COLORS[ci];
    document.getElementById('mpP').classList.add('on');
    this.startSync(); this.startPoll();
  },

  // HOST saves world seed so guests can generate the same world
  saveWorldSeed(){
    try{
      localStorage.setItem(this.wk(), JSON.stringify({seed:wCfg.seed, biome:wCfg.biome, diff:wCfg.diff}));
    }catch(e){}
  },

  loadWorldSeed(){
    try{
      const raw=localStorage.getItem(this.wk());
      if(raw){const d=JSON.parse(raw);wCfg.seed=d.seed;wCfg.biome=d.biome;wCfg.diff=d.diff;return true;}
    }catch(e){}
    return false;
  },

  publish(){
    const state={
      id:this.myId, name:P.name, avatar:P.avatar, color:this.myColor,
      wx:Math.round(P.wx), wy:Math.round(P.wy),
      vx:Math.round(P.vx*10)/10, vy:Math.round(P.vy*10)/10,
      facing:P.facing, moving:P.moving,
      hp:Math.round(P.hp), mhp:P.mhp, level:P.level,
      torch:P.torch, lantern:P.lantern, raft:P.raft,
      ts:Date.now()
    };
    try{
      localStorage.setItem(this.lk(this.myId),JSON.stringify(state));
      const reg=JSON.parse(localStorage.getItem(this.sk())||'{}');
      reg[this.myId]=Date.now();
      localStorage.setItem(this.sk(),JSON.stringify(reg));
    }catch(e){}
    if(Date.now()-this.lastCloud>2500){
      this.lastCloud=Date.now();
      Arcadia.save(JSON.stringify({...state,type:'mp',session:this.session}));
    }
  },

  read(){
    let reg={};
    try{reg=JSON.parse(localStorage.getItem(this.sk())||'{}');}catch(e){}
    const now=Date.now(), found=[];
    for(const[id,ts] of Object.entries(reg)){
      if(id===this.myId||now-ts>this.TIMEOUT) continue;
      try{
        const raw=localStorage.getItem(this.lk(id));
        if(!raw) continue;
        const s=JSON.parse(raw);
        if(now-s.ts>this.TIMEOUT) continue;
        const ex=this.peers.get(id);
        if(!ex){
          this.peers.set(id,{...s,walkCycle:0,animT:0,wxT:s.wx,wyT:s.wy});
          addMsg(`👋 ${s.name} entró al mundo!`,true);
          Audio.sfx('mp_join');
          Arcadia.unlock('mp_join');
        } else {
          this.peers.set(id,{...ex,...s,wxT:s.wx,wyT:s.wy});
        }
        found.push(id);
      }catch(e){}
    }
    for(const[id] of this.peers){
      if(!found.includes(id)){
        const p=this.peers.get(id);
        addMsg(`👋 ${p.name} se desconectó`,true);
        this.peers.delete(id);
      }
    }
  },

  startSync(){this.syncT=setInterval(()=>this.publish(),this.SYNC);},
  startPoll(){this.pollT=setInterval(()=>this.read(),this.POLL);},
  stop(){
    clearInterval(this.syncT);clearInterval(this.pollT);
    this.active=false; this.peers.clear();
    try{localStorage.removeItem(this.lk(this.myId));}catch(e){}
  },

  tick(dt){
    for(const[,p] of this.peers){
      p.animT+=dt*.006;
      if(p.moving) p.walkCycle=Math.sin(p.animT*8);
      else p.walkCycle*=.84;
      // Smooth interpolation
      p.wx+=(p.wxT-p.wx)*.22;
      p.wy+=(p.wyT-p.wy)*.22;
    }
  }
};

let gatherHeld=false;
let gatherKey=null;

function tryGather(){
  Audio.resume();
  const tx=Math.floor(P.wx/TILE), ty=Math.floor(P.wy/TILE);
  let found=false;
  for(let dy=-1;dy<=1&&!found;dy++) for(let dx=-1;dx<=1&&!found;dx++){
    const key=`${tx+dx},${ty+dy}`;
    const res=wRes.get(key);
    if(res&&res.resp<=0&&!res.broken){
      found=true;
      if(gatherKey!==key){
        // New target — reset progress
        gatherKey=key;
        P.gatherTarget=res;
        P.gatherProgress=0;
        P.gatherMax=res.mhp;
      }
      // Damage
      const sel=P.hbar[P.slot];
      let dmg=1;
      if(sel==='AXE'&&['TREE','PINE'].includes(res.type)) dmg=3;
      if(sel==='PICKAXE'&&['ROCK','CRYSTAL','IRON'].includes(res.type)) dmg=3;
      res.hp-=dmg;
      P.gatherProgress=res.mhp-res.hp;
      spawnFX((tx+dx+.5)*TILE,(ty+dy+.5)*TILE,RT[res.type].e);
      Audio.sfx('gather');

      // Show progress bar
      const bar=document.getElementById('gBar');
      bar.style.display='block';
      document.getElementById('gbEm').textContent=RT[res.type].e;
      document.getElementById('gbNm').textContent=RT[res.type].n;
      const pct=Math.round((P.gatherProgress/P.gatherMax)*100);
      document.getElementById('gbFl').style.width=pct+'%';
      document.getElementById('gbHp').textContent=`${res.hp}/${res.mhp} HP`;

      if(res.hp<=0){
        for(const[item,amt] of Object.entries(RT[res.type].loot)){
          const got=Math.max(1,Math.round(amt*(.5+Math.random()*.8)));
          addItem(item,got);
        }
        Audio.sfx('break');
        res.resp=280+Math.random()*180; res.hp=res.mhp; res.broken=false;
        P.gatherTarget=null; gatherKey=null; P.gatherProgress=0;
        document.getElementById('gBar').style.display='none';
        gainXP(12+P.level*3); P.energy=Math.max(0,P.energy-5);
        Arcadia.unlock('first_gather');
      }
      P.energy=Math.max(0,P.energy-1.5);
    }
  }
  if(!found){
    addMsg('Nada que recolectar cerca (E)');
    document.getElementById('gBar').style.display='none';
    gatherKey=null; P.gatherTarget=null;
  }
}

function addItem(id,n=1){
  P.inv[id]=(P.inv[id]||0)+n;
  if(!P.hbar.includes(id)){const e=P.hbar.indexOf(null);if(e>=0)P.hbar[e]=id;}
  addMsg(`+${n} ${IT[id]?.e||''} ${IT[id]?.n||id}`);
  renderHbar(); scheduleSave();
}
function removeItem(id,n=1){
  P.inv[id]=Math.max(0,(P.inv[id]||0)-n);
  if(!P.inv[id]){delete P.inv[id];P.hbar=P.hbar.map(s=>s===id?null:s);}
  renderHbar();
}
function hasIt(needs){return Object.entries(needs).every(([k,v])=>(P.inv[k]||0)>=v);}

let saveT=null;
function scheduleSave(){
  clearTimeout(saveT);
  saveT=setTimeout(()=>{
    const d=JSON.stringify({inv:P.inv,hp:P.hp,food:P.food,energy:P.energy,xp:P.xp,level:P.level,day:P.day,time:P.time,wx:P.wx,wy:P.wy,name:P.name,seed:wCfg.seed,biome:wCfg.biome});
    Arcadia.save(d); Arcadia.setRank(P.xp);
  },3000);
}

let craftOpen=false;
function toggleCraft(){
  craftOpen=!craftOpen;
  document.getElementById('crP').className=craftOpen?'on':'';
  if(craftOpen) renderCraft();
}
function renderCraft(){
  const list=document.getElementById('crL'); list.innerHTML='';
  for(const r of REC){
    const can=hasIt(r.needs);
    const div=document.createElement('div');
    div.className='crI '+(can?'y':'n');
    const cost=Object.entries(r.needs).map(([k,v])=>`${IT[k]?.e||''}${v}`).join(' ');
    div.innerHTML=`<span class="crN">${r.e} ${r.n}</span><span class="crC">${cost}</span>`;
    if(can) div.onclick=()=>doCraft(r);
    list.appendChild(div);
  }
}
function doCraft(r){
  if(!hasIt(r.needs)){addMsg('¡Faltan materiales!');return;}
  for(const[k,v] of Object.entries(r.needs)) removeItem(k,v);
  for(const[k,v] of Object.entries(r.gives)) addItem(k,v);
  gainXP(30+P.level*5);
  addMsg(`⚒ Creaste ${IT[r.id].e} ${IT[r.id].n}!`);
  spawnFX(P.wx,P.wy,'⚒','#ffd700');
  Audio.sfx('craft');
  renderCraft();
  Arcadia.unlock('first_craft');
}

function useSelected(){
  Audio.resume();
  const id=P.hbar[P.slot];
  if(!id||!P.inv[id]){addMsg('Nada seleccionado (F)');return;}
  const it=IT[id];
  if(!it?.use){addMsg(`${it?.e||''} ${it?.n||id}: no usable directamente`);return;}
  if(it.use==='food'){
    P.food=Math.min(P.mfood,P.food+(it.v||20));
    removeItem(id,1); addMsg(`🍖 +${it.v||20} Hambre`);
    spawnFX(P.wx,P.wy,'😋'); Audio.sfx('eat');
  } else if(it.use==='heal'){
    P.hp=Math.min(P.mhp,P.hp+(it.v||40));
    removeItem(id,1); addMsg(`❤ +${it.v} Vida`);
    spawnFX(P.wx,P.wy,'❤','#e74c3c'); Audio.sfx('eat');
  } else if(it.use==='torch'){
    P.torch=!P.torch; addMsg(P.torch?'🔦 Antorcha encendida':'🔦 Apagada');
  } else if(it.use==='lantern'){
    P.lantern=!P.lantern; addMsg(P.lantern?'🏮 Linterna encendida':'🏮 Apagada');
  } else if(it.use==='camp'){
    P.energy=Math.min(P.menergy,P.energy+70);
    removeItem(id,1); addMsg('⛺ ¡Descansaste! +70 Energía');
    spawnFX(P.wx,P.wy,'💤','#74b9ff');
  } else if(it.use==='raft'){
    P.raft=!P.raft; addMsg(P.raft?'🛶 Navegando':'🛶 Desembarcaste');
  } else if(it.use==='armor'){
    P.mhp=Math.min(200,P.mhp+20); P.hp=Math.min(P.mhp,P.hp+20);
    removeItem(id,1); addMsg('🛡 +20 HP Máximo');
  }
}

function gainXP(n){
  P.xp+=n;
  while(P.xp>=P.xpN){
    P.xp-=P.xpN; P.level++;
    P.xpN=Math.floor(P.level*100*1.25);
    P.mhp+=10; P.hp=P.mhp;
    addMsg(`✨ ¡NIVEL ${P.level}! Salud +10`);
    spawnFX(P.wx,P.wy-22,'⬆ NIV!','#ffd700');
    Audio.sfx('levelup');
    Arcadia.unlock('level_up');
  }
}

function skyRGB(t){
  const h=t/60;
  if(h<5)  return[8,12,22];
  if(h<6)  return l3([8,12,22],[255,108,60],h-5);
  if(h<7)  return l3([255,108,60],[130,200,230],h-6);
  if(h<17) return[130,200,230];
  if(h<18) return l3([130,200,230],[255,116,55],h-17);
  if(h<19) return l3([255,116,55],[55,28,75],h-18);
  if(h<20) return l3([55,28,75],[8,12,22],h-19);
  return[8,12,22];
}
function l3(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*Math.max(0,Math.min(1,t))));}
function getDark(t){
  const h=t/60;
  if(h>=7&&h<17) return 0;
  if(h<5) return .92;
  if(h<7) return .92*(1-(h-5)/2);
  if(h>=17&&h<20) return (h-17)/3*.92;
  return .92;
}

// ════════════════════════════════════════════════════════
//  MOVEMENT (velocity, slide collision)
// ════════════════════════════════════════════════════════
let stepT=0;
function moveP(dt){
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA']||mk.l){dx=-1;P.facing='left';}
  if(keys['ArrowRight']||keys['KeyD']||mk.r){dx=1;P.facing='right';}
  if(keys['ArrowUp']||keys['KeyW']||mk.u){dy=-1;P.facing='up';}
  if(keys['ArrowDown']||keys['KeyS']||mk.d){dy=1;P.facing='down';}
  if(dx&&dy){const f=1/Math.SQRT2;dx*=f;dy*=f;}
  const spd=P.speed*(P.energy<15?.5:1);
  P.vx=(P.vx+dx*spd)*.78+dx*.28;
  P.vy=(P.vy+dy*spd)*.78+dy*.28;
  const mv=P.speed*2.2;
  P.vx=Math.max(-mv,Math.min(mv,P.vx));
  P.vy=Math.max(-mv,Math.min(mv,P.vy));

  // Separate axis collision
  const nx=P.wx+P.vx, ny=P.wy+P.vy;
  if(canWalk(nx,P.wy)) P.wx=Math.max(TILE/2,Math.min(MW*TILE-TILE/2,nx));
  else P.vx*=-.18;
  if(canWalk(P.wx,ny)) P.wy=Math.max(TILE/2,Math.min(MH*TILE-TILE/2,ny));
  else P.vy*=-.18;

  P.moving=(Math.abs(P.vx)+Math.abs(P.vy))>.18;
  if(P.moving){
    P.animT+=dt*.0075; P.walkCycle=Math.sin(P.animT*8);
    P.energy=Math.max(0,P.energy-.011*dt/16);
    stepT+=dt;
    if(stepT>320){stepT=0; Audio.sfx('step');}
  } else { P.vx*=.7; P.vy*=.7; }
}

function canWalk(wx2,wy2){
  const tx=Math.floor(wx2/TILE),ty=Math.floor(wy2/TILE);
  if(tx<0||ty<0||tx>=MW||ty>=MH) return false;
  const tt=wMap[ty]?.[tx]?.type;
  if((tt===T.DEEP||tt===T.WATER)&&!P.raft) return false;
  const res=wRes.get(`${tx},${ty}`);
  if(res&&res.resp<=0&&RT[res.type]?.solid) return false;
  return true;
}

  sTk+=dt; if(sTk<200) return; sTk=0;
  P.time+=1;
  if(P.time>=1440){P.time=0;P.day++;addMsg(`🌅 ¡Día ${P.day}!`);}
  P.food=Math.max(0,P.food-.28);
  if(P.food<=0){P.hp=Math.max(0,P.hp-1.5);addMsg('😰 ¡Tienes mucha hambre!');}
  if(P.food<12){
    for(const id of['BERRY','APPLE','MUSHROOM','FISHC']){
      if((P.inv[id]||0)>0){
        const it=IT[id];
        P.food=Math.min(P.mfood,P.food+(it.v||15));
        removeItem(id,1); addMsg(`🍽 Comiste ${it.e} auto`);
        Audio.sfx('eat'); break;
      }
    }
  }
  if(!P.moving&&P.energy<P.menergy) P.energy=Math.min(P.menergy,P.energy+.4);
  for(const r of wRes.values()) if(r.resp>0) r.resp--;
}

// CAMERA
function updateCam(){
  cam.tx=P.wx-W/2; cam.ty=P.wy-H/2;
  cam.tx=Math.max(0,Math.min(MW*TILE-W,cam.tx));
  cam.ty=Math.max(0,Math.min(MH*TILE-H,cam.ty));
  cam.x+=(cam.tx-cam.x)*.13; cam.y+=(cam.ty-cam.y)*.13;
}

// ════════════════════════════════════════════════════════
//  RENDER — BACKGROUND / SKY
// ════════════════════════════════════════════════════════
function renderBG(){
  const[r,g,b]=skyRGB(P.time);
  bgx.fillStyle=`rgb(${r},${g},${b})`; bgx.fillRect(0,0,W,H);
  const dk=getDark(P.time);
  if(dk>.25){
    // Stars
    bgx.fillStyle=`rgba(255,255,255,${dk*.55})`;
    for(let i=0;i<120;i++){
      const sx=nh(i,0,42)*W, sy=nh(0,i,42)*H*.48;
      const sz=nh(i,i,42)<.75?1:1.5;
      bgx.fillRect(sx,sy,sz,sz);
    }
    // Moon
    const mx=W*.74,my=H*.11;
    bgx.fillStyle=`rgba(225,238,255,${dk*.88})`;
    bgx.beginPath(); bgx.arc(mx,my,19,0,Math.PI*2); bgx.fill();
    bgx.fillStyle=`rgb(${r},${g},${b})`;
    bgx.beginPath(); bgx.arc(mx+6,my-3,15,0,Math.PI*2); bgx.fill();
  } else {
    const sh=P.time/60, t=(sh-6)/14;
    const sunX=W*.1+W*.8*t, sunY=H*.22-Math.sin(t*Math.PI)*H*.18;
    const grd=bgx.createRadialGradient(sunX,sunY,0,sunX,sunY,38);
    grd.addColorStop(0,'rgba(255,245,100,.9)');
    grd.addColorStop(.55,'rgba(255,200,50,.35)');
    grd.addColorStop(1,'rgba(255,200,50,0)');
    bgx.fillStyle=grd; bgx.beginPath(); bgx.arc(sunX,sunY,38,0,Math.PI*2); bgx.fill();
    bgx.fillStyle='rgba(255,245,125,.94)';
    bgx.beginPath(); bgx.arc(sunX,sunY,13,0,Math.PI*2); bgx.fill();
  }
}

// ════════════════════════════════════════════════════════
//  RENDER — WORLD TILES + RESOURCES
// ════════════════════════════════════════════════════════
function renderWorld(){
  wx.clearRect(0,0,W,H);
  const sx=Math.max(0,Math.floor(cam.x/TILE)-1);
  const sy=Math.max(0,Math.floor(cam.y/TILE)-1);
  const ex2=Math.min(MW,Math.ceil((cam.x+W)/TILE)+1);
  const ey=Math.min(MH,Math.ceil((cam.y+H)/TILE)+1);
  const tt=Date.now()*.001;

  for(let y=sy;y<ey;y++) for(let x=sx;x<ex2;x++){
    const tile=wMap[y][x];
    const co=TC[tile.type][tile.v%3];
    const px2=Math.round(x*TILE-cam.x), py2=Math.round(y*TILE-cam.y);
    wx.fillStyle=`rgb(${co[0]},${co[1]},${co[2]})`;
    wx.fillRect(px2,py2,TILE+1,TILE+1);

    // Detail overlays
    if(tile.type===T.WATER||tile.type===T.DEEP||tile.type===T.SHORE){
      wx.globalAlpha=.1;
      const wo=Math.sin(tt*1.2+x*.6+y*.4)*3;
      wx.fillStyle='#fff';
      wx.fillRect(px2+4+wo,py2+TILE*.38,TILE*.48,2.5);
      wx.fillRect(px2+7+wo,py2+TILE*.62,TILE*.33,2);
      wx.globalAlpha=1;
    }
    if(tile.type===T.VILLAGE){
      // Draw simple house outline
      wx.fillStyle='rgba(180,140,80,.3)';
      wx.fillRect(px2+3,py2+3,TILE-6,TILE-6);
    }
    if(tile.type===T.RUIN){
      wx.fillStyle='rgba(80,70,55,.25)';
      wx.fillRect(px2+2,py2+2,TILE-4,TILE-4);
    }
    // Grid line
    wx.strokeStyle='rgba(0,0,0,.05)'; wx.lineWidth=1;
    wx.strokeRect(px2,py2,TILE,TILE);
  }

  // RESOURCES
  wx.font=`${Math.round(TILE*.68)}px serif`;
  wx.textAlign='center';
  for(let y=sy;y<ey;y++) for(let x=sx;x<ex2;x++){
    const res=wRes.get(`${x},${y}`);
    if(!res||res.resp>0) continue;
    const rd=RT[res.type];
    const px2=Math.round(x*TILE-cam.x+TILE/2);
    const py2=Math.round(y*TILE-cam.y+TILE*.86);
    const bob=Math.sin(tt*1.5+res.anim)*1.8;
    wx.globalAlpha=.18;
    wx.fillStyle='#000';
    wx.beginPath(); wx.ellipse(px2,py2+3,TILE*.33,3.5,0,0,Math.PI*2); wx.fill();
    wx.globalAlpha=1;
    // If being mined, flash
    if(gatherKey===`${x},${y}`){
      wx.globalAlpha=.5+Math.sin(tt*12)*.4;
    }
    wx.fillText(rd.e,px2,py2+bob);
    wx.globalAlpha=1;
    // HP bar on top of resource if damaged
    if(res.hp<res.mhp&&res.hp>0){
      const bx=px2-TILE*.4, by=py2-TILE*.72;
      wx.fillStyle='rgba(0,0,0,.6)'; wx.fillRect(bx,by,TILE*.8,4);
      const frac=res.hp/res.mhp;
      wx.fillStyle=frac>.6?'#4ecb71':frac>.3?'#f39c12':'#e74c3c';
      wx.fillRect(bx,by,TILE*.8*frac,4);
    }
  }

  // STRUCTURE LABELS
  for(const s of STRUCTURES){
    const px2=Math.round(s.x*TILE-cam.x+TILE/2);
    const py2=Math.round(s.y*TILE-cam.y);
    if(px2<-60||px2>W+60||py2<-30||py2>H+30) continue;
    if(s.type==='village'){
      wx.font='bold 11px Nunito,sans-serif'; wx.textAlign='center';
      wx.fillStyle='rgba(220,200,100,.9)';
      wx.fillText('🏘 Aldea',px2,py2-4);
    } else if(s.type==='ruin'){
      wx.font='bold 10px Nunito,sans-serif';
      wx.fillStyle='rgba(180,160,100,.8)';
      wx.fillText('🏚 Ruinas',px2,py2-4);
    }
  }
}

// ════════════════════════════════════════════════════════
//  RENDER — ENTITIES (player + MP)
// ════════════════════════════════════════════════════════
function drawChar(ctx2,wx2,wy2,facing,moving,wc,name,color,hasTorch,hasLantern,isLocal){
  const px2=Math.round(wx2-cam.x), py2=Math.round(wy2-cam.y);
  if(px2<-60||px2>W+60||py2<-70||py2>H+70) return;
  const bob=moving?wc*4:0;
  const l1=moving?wc*9:0, l2=moving?-wc*9:0;

  // Shadow
  ctx2.globalAlpha=.22; ctx2.fillStyle='#000';
  ctx2.beginPath(); ctx2.ellipse(px2,py2+2,11,4.5,0,0,Math.PI*2); ctx2.fill();
  ctx2.globalAlpha=1;

  // Legs
  ctx2.fillStyle='#52361e';
  ctx2.save(); ctx2.translate(px2-5,py2-1); ctx2.rotate(l1*Math.PI/180);
  ctx2.beginPath(); ctx2.roundRect(-3,0,6,10,3); ctx2.fill(); ctx2.restore();
  ctx2.save(); ctx2.translate(px2+5,py2-1); ctx2.rotate(l2*Math.PI/180);
  ctx2.beginPath(); ctx2.roundRect(-3,0,6,10,3); ctx2.fill(); ctx2.restore();

  // Body
  ctx2.fillStyle=color;
  ctx2.beginPath(); ctx2.roundRect(px2-8,py2-16+bob*.3,16,13,5); ctx2.fill();
  ctx2.fillStyle='rgba(0,0,0,.14)';
  ctx2.beginPath(); ctx2.roundRect(px2-8,py2-9+bob*.3,16,6,5); ctx2.fill();

  // Head
  ctx2.fillStyle='#f0c070';
  ctx2.beginPath(); ctx2.roundRect(px2-7,py2-28+bob*.2,14,13,6); ctx2.fill();

  // Eyes
  if(facing!=='up'){
    ctx2.fillStyle='#2e1a08';
    ctx2.beginPath(); ctx2.arc(px2-2.5,py2-22+bob*.2,1.8,0,Math.PI*2); ctx2.fill();
    ctx2.beginPath(); ctx2.arc(px2+2.5,py2-22+bob*.2,1.8,0,Math.PI*2); ctx2.fill();
    ctx2.fillStyle='#fff';
    ctx2.beginPath(); ctx2.arc(px2-1.8,py2-23+bob*.2,.7,0,Math.PI*2); ctx2.fill();
    ctx2.beginPath(); ctx2.arc(px2+3.2,py2-23+bob*.2,.7,0,Math.PI*2); ctx2.fill();
  }

  // Hat
  ctx2.fillStyle='#2c1e0a';
  ctx2.beginPath(); ctx2.roundRect(px2-9,py2-32+bob*.2,18,5,3); ctx2.fill();
  ctx2.fillStyle='#3d2812';
  ctx2.beginPath(); ctx2.roundRect(px2-5,py2-40+bob*.2,10,10,4); ctx2.fill();
  ctx2.fillStyle=color;
  ctx2.fillRect(px2-5,py2-34+bob*.2,10,2);

  // Name tag for remote players
  if(!isLocal){
    ctx2.fillStyle='rgba(7,18,10,.82)';
    ctx2.beginPath(); ctx2.roundRect(px2-28,py2-52,56,14,5); ctx2.fill();
    ctx2.fillStyle='#a8e6be'; ctx2.font='bold 9px Nunito,sans-serif';
    ctx2.textAlign='center'; ctx2.fillText(name,px2,py2-42);
  }

  // Light glow
  if(hasTorch||hasLantern){
    const lr=hasLantern?165:105;
    const grd=ctx2.createRadialGradient(px2,py2-14,0,px2,py2-14,lr);
    grd.addColorStop(0,'rgba(255,195,55,.16)');
    grd.addColorStop(.6,'rgba(255,150,30,.04)');
    grd.addColorStop(1,'rgba(255,150,30,0)');
    ctx2.fillStyle=grd; ctx2.beginPath(); ctx2.arc(px2,py2-14,lr,0,Math.PI*2); ctx2.fill();
    ctx2.font='12px serif'; ctx2.textAlign='center';
    ctx2.fillText(hasLantern?'🏮':'🔦',px2+10,py2-18);
  }
  if(P.raft&&isLocal){
    ctx2.font='22px serif'; ctx2.textAlign='center';
    ctx2.fillText('🛶',px2,py2+13);
  }
}

function renderEntities(){
  ex.clearRect(0,0,W,H);
  if(MP.active){
    for(const[,p] of MP.peers){
      drawChar(ex,p.wx,p.wy,p.facing||'down',p.moving,p.walkCycle||0,p.name,p.color||'#f39c12',p.torch,p.lantern,false);
    }
  }
  drawChar(ex,P.wx,P.wy,P.facing,P.moving,P.walkCycle,'Tú',MP.active?MP.myColor:'#4a7820',P.torch,P.lantern,true);
}

// ════════════════════════════════════════════════════════
//  RENDER — REALISTIC LIGHTING
// ════════════════════════════════════════════════════════
function renderLight(){
  lx.clearRect(0,0,W,H);
  const dk=getDark(P.time);
  if(dk<=0) return;
  lx.fillStyle=`rgba(0,4,10,${dk})`; lx.fillRect(0,0,W,H);
  const ppx=Math.round(P.wx-cam.x), ppy=Math.round(P.wy-cam.y);
  const lights=[{x:ppx,y:ppy,r:38,i:.45}];
  if(P.torch) lights.push({x:ppx+9,y:ppy-18,r:115,i:1.05});
  if(P.lantern) lights.push({x:ppx+8,y:ppy-17,r:178,i:1.15});
  if(MP.active){
    for(const[,p] of MP.peers){
      const rx=Math.round(p.wx-cam.x), ry=Math.round(p.wy-cam.y);
      lights.push({x:rx,y:ry,r:32,i:.35});
      if(p.torch) lights.push({x:rx+9,y:ry-18,r:105,i:.9});
      if(p.lantern) lights.push({x:rx+8,y:ry-17,r:165,i:1.0});
    }
  }
  // Cut through darkness
  lx.globalCompositeOperation='destination-out';
  for(const l of lights){
    const grd=lx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r);
    grd.addColorStop(0,`rgba(255,255,255,${Math.min(1,l.i*(1-dk*.08))})`);
    grd.addColorStop(.4,`rgba(255,255,255,${.55*l.i})`);
    grd.addColorStop(.75,`rgba(255,255,255,${.18*l.i})`);
    grd.addColorStop(1,'rgba(255,255,255,0)');
    lx.fillStyle=grd; lx.beginPath(); lx.arc(l.x,l.y,l.r,0,Math.PI*2); lx.fill();
  }
  lx.globalCompositeOperation='multiply';
  for(const l of lights){
    const grd=lx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r);
    grd.addColorStop(0,'rgba(255,178,55,.38)');
    grd.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=grd; lx.beginPath(); lx.arc(l.x,l.y,l.r,0,Math.PI*2); lx.fill();
  }
  lx.globalCompositeOperation='source-over';
}

// ════════════════════════════════════════════════════════
//  RENDER — PARTICLES
// ════════════════════════════════════════════════════════
function renderFX(dt){
  px.clearRect(0,0,W,H); px.textAlign='center';
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.t+=dt/1000; p.wy+=p.vy;
    const life=Math.max(0,1-p.t/1.4);
    if(life<=0){parts.splice(i,1);continue;}
    px.globalAlpha=life;
    px.font=`bold ${13+Math.floor(p.t*9)}px serif`;
    px.fillStyle=p.col;
    px.fillText(p.txt,Math.round(p.wx-cam.x),Math.round(p.wy-cam.y));
  }
  px.globalAlpha=1;
}

// ════════════════════════════════════════════════════════
//  MINIMAP
// ════════════════════════════════════════════════════════
let mmT=0;
function renderMinimap(dt){
  mmT+=dt; if(mmT<200) return; mmT=0;
  const mc=document.getElementById('mmC');
  const mctx=mc.getContext('2d');
  const mw=mc.width,mh=mc.height;
  const scaleX=mw/MW, scaleY=mh/MH;
  mctx.clearRect(0,0,mw,mh);
  // Draw tiles scaled
  for(let y=0;y<MH;y+=2) for(let x=0;x<MW;x+=2){
    const co=TC[wMap[y][x].type][0];
    mctx.fillStyle=`rgb(${co[0]},${co[1]},${co[2]})`;
    mctx.fillRect(x*scaleX,y*scaleY,2*scaleX+1,2*scaleY+1);
  }
  // Player dot
  const ppx=P.wx/TILE*scaleX, ppy=P.wy/TILE*scaleY;
  mctx.fillStyle='#fff';
  mctx.beginPath(); mctx.arc(ppx,ppy,2.5,0,Math.PI*2); mctx.fill();
  mctx.fillStyle='#4ecb71';
  mctx.beginPath(); mctx.arc(ppx,ppy,1.5,0,Math.PI*2); mctx.fill();
  // MP players
  if(MP.active){
    for(const[,p] of MP.peers){
      const rx=p.wx/TILE*scaleX, ry=p.wy/TILE*scaleY;
      mctx.fillStyle=p.color||'#f39c12';
      mctx.beginPath(); mctx.arc(rx,ry,2,0,Math.PI*2); mctx.fill();
    }
  }
  // Camera view rect
  mctx.strokeStyle='rgba(255,255,255,.25)'; mctx.lineWidth=1;
  mctx.strokeRect(cam.x/TILE*scaleX, cam.y/TILE*scaleY, (W/TILE)*scaleX, (H/TILE)*scaleY);
}

//  HUD UPDATE
// ════════════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('bHp').style.width=(P.hp/P.mhp*100)+'%';
  document.getElementById('bFd').style.width=(P.food/P.mfood*100)+'%';
  document.getElementById('bEn').style.width=(P.energy/P.menergy*100)+'%';
  document.getElementById('vHp').textContent=Math.round(P.hp);
  document.getElementById('vFd').textContent=Math.round(P.food);
  document.getElementById('vEn').textContent=Math.round(P.energy);
  const h=Math.floor(P.time/60),m=Math.floor(P.time%60);
  const isDay=P.time>=6*60&&P.time<20*60;
  const isTwi=(P.time>=17*60&&P.time<20*60)||(P.time>=5*60&&P.time<7*60);
  document.getElementById('cEmo').textContent=isDay?(isTwi?'🌅':'☀️'):'🌙';
  document.getElementById('cTime').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('cDay').textContent=`DÍA ${P.day}`;
  const tx=Math.floor(P.wx/TILE), ty=Math.floor(P.wy/TILE);
  const BN={[T.DEEP]:'🌊 OCÉANO',[T.WATER]:'🌊 AGUA',[T.SHORE]:'🏖 ORILLA',[T.SAND]:'🏜 PLAYA',
    [T.GRASS]:'🌱 LLANURA',[T.MEADOW]:'🌸 PRADERA',[T.FOREST]:'🌲 BOSQUE',[T.DENSE]:'🌲 DENSO',
    [T.MUD]:'🦎 PANTANO',[T.STONE]:'🪨 PIEDRAS',[T.MTN]:'⛰ MONTAÑA',[T.SNOW]:'❄ NIEVE',
    [T.FLOWER]:'🌷 FLORECIDO',[T.RUIN]:'🏚 RUINAS',[T.VILLAGE]:'🏘 ALDEA'};
  document.getElementById('cBio').textContent=BN[wMap[ty]?.[tx]?.type]||'?';
  document.getElementById('xpI').style.width=(P.xp/P.xpN*100)+'%';
  document.getElementById('xpV').textContent=P.xp;
  document.getElementById('lvV').textContent=P.level;
  document.getElementById('posV').textContent=`${tx},${ty}`;
  // MP panel
  if(MP.active){
    const arr=[...MP.peers.values()];
    document.getElementById('mpCnt').textContent=arr.length;
    document.getElementById('mpList').innerHTML=arr.map(p=>{
      const d=Math.round(Math.sqrt((p.wx-P.wx)**2+(p.wy-P.wy)**2)/TILE);
      return `<div class="mpPE"><span class="mpDE">${p.avatar||'🧑'}</span><span>${p.name}</span><span class="mpDst">${d}t</span></div>`;
    }).join('');
    document.getElementById('mpSy').textContent=`sesión ${MP.session} · sync ${MP.SYNC}ms`;
  }
}

function renderHbar(){
  const hb=document.getElementById('hbar'); hb.innerHTML='';
  for(let i=0;i<8;i++){
    const id=P.hbar[i], div=document.createElement('div');
    div.className='hS'+(P.slot===i?' on':'');
    div.innerHTML=`<span class="hN">${i+1}</span>`;
    if(id&&P.inv[id]){
      div.innerHTML+=`${IT[id]?.e||'?'}<span class="hC2">${P.inv[id]}</span>`;
      div.onmouseenter=()=>showTip(id,div);
      div.onmouseleave=()=>document.getElementById('ttp').style.display='none';
    }
    div.onclick=()=>setSlot(i);
    hb.appendChild(div);
  }
}
function showTip(id,el){
  const it=IT[id],tt=document.getElementById('ttp');
  document.getElementById('ttN').textContent=`${it.e} ${it.n}`;
  document.getElementById('ttD').textContent=it.d;
  document.getElementById('ttU').textContent=it.use?'F para usar':'';
  tt.style.display='block';
  const r=el.getBoundingClientRect();
  tt.style.left=r.left+'px'; tt.style.top=(r.top-90)+'px';
}

//  SCREEN NAVIGATION
// ════════════════════════════════════════════════════════
function goIntro(){
  ['sI','sW','sMp'].forEach(id=>document.getElementById(id).style.display=id==='sI'?'flex':'none');

  document.getElementById('mmap').style.display='none';

function goWorld(){
  document.getElementById('sI').style.display='none';

}
function goMp(){
  document.getElementById('sI').style.display='none';

  lobbyPoll=setInterval(pollLobby,800);
}
function pickB(el){
  document.querySelectorAll('.bc').forEach(e=>e.classList.remove('on'));
  el.classList.add('on'); wCfg.biome=el.dataset.b; drawPv();
}
function doJoin(){
  const code=document.getElementById('joinI').value.trim().toUpperCase();
  if(code.length!==4){toast('⚠ Ingresa un código de 4 letras');return;}
  mySessionCode=code;
  document.getElementById('myCode').textContent=mySessionCode;
  toast('🔗 Unido a sesión: '+code);
  clearInterval(lobbyPoll);
  lobbyPoll=setInterval(pollLobby,800);
  pollLobby();
}
function copyCode(){
  navigator.clipboard?.writeText(mySessionCode).catch(()=>{});
  toast('📋 Código copiado: '+mySessionCode);
}
function doStartWorld(){
  wCfg.seed=document.getElementById('seedI').value||Math.random().toString(36).slice(2,10);
  wCfg.diff=parseInt(document.getElementById('dSl').value);
  beginLoad(false);
}
async function loadGame(){
  const res=await Arcadia.load();
  if(res?.success&&res.data){
    try{
      const d=JSON.parse(res.data);
      Object.assign(P,{inv:d.inv||{},hp:d.hp||100,food:d.food||100,energy:d.energy||100,
        xp:d.xp||0,level:d.level||1,day:d.day||1,time:d.time||360,wx:d.wx||100*34,wy:d.wy||100*34,name:d.name||'Viajero'});
      if(d.seed) wCfg.seed=d.seed;
      if(d.biome) wCfg.biome=d.biome;
      addMsg('💾 Partida cargada!');
    }catch(e){}
  }
  beginLoad(false);
}
function startMpGame(){
  clearInterval(lobbyPoll);
  // If joining (code in joinI), load host world seed first
  const joinCode=document.getElementById('joinI').value.trim().toUpperCase();
  if(joinCode.length===4){
    mySessionCode=joinCode;
  }
  MP.init(mySessionCode, myUserId, joinCode.length!==4);
  if(joinCode.length!==4){
    // Host: create world with current seed, save it for guests
    wCfg.seed=document.getElementById('seedI')?.value||Math.random().toString(36).slice(2,10);
    wCfg.biome='balanced';
    MP.saveWorldSeed();
  } else {
    // Guest: load host world config
    MP.loadWorldSeed();
  }
  beginLoad(true);
}

function beginLoad(mp){
  ['sI','sW','sMp'].forEach(id=>document.getElementById(id).style.display='none');
  let prog=0;
  const li=setInterval(()=>{
    prog=Math.min(100,prog+Math.random()*22);
    document.getElementById('lb').style.width=prog+'%';
    if(prog>=100){clearInterval(li);document.getElementById('lb').style.width='0';initGame(mp);}
  },70);
}

function initGame(mp){
  genWorld();
  // Spawn player on safe grass tile near center
  let ok=false;
  for(let att=0;att<2000&&!ok;att++){
    const tx=50+Math.floor(Math.random()*100), ty=50+Math.floor(Math.random()*100);
    if(wMap[ty]?.[tx]?.type===T.GRASS&&!wRes.has(`${tx},${ty}`)){
      P.wx=(tx+.5)*TILE; P.wy=(ty+.5)*TILE; ok=true;
    }
  }
  cam.x=P.wx-W/2; cam.y=P.wy-H/2;

  // Starter items
  ['WOOD','STONE','BERRY','FLINT'].forEach((id,i)=>{
    P.inv[id]=[5,3,5,2][i]; P.hbar[i]=id;
  });

  document.getElementById('gUI').style.display='block';
  document.getElementById('mmap').style.display='block';
  document.getElementById('mAct').style.display='flex';
  renderHbar();

  addMsg('🌿 ¡Bienvenido a WildCraft!');
  setTimeout(()=>addMsg('E·Recolectar  C·Craftear  F·Usar'),2000);
  setTimeout(()=>addMsg(`🗺 Mundo ${MW}×${MH} tiles — Semilla: ${wCfg.seed}`),4000);

  if(mp){
    document.getElementById('mpP').classList.add('on');
    addMsg(`👥 Multijugador — Sesión ${MP.session}`,true);
  }

  // Arcadia
  Arcadia.login().then(r=>{
    if(r?.success&&r.user){
      P.name=r.user.username||'Viajero';
      P.avatar=r.user.avatar||'🧑';
      myUserId='arc_'+r.user.id;
      document.getElementById('pNm').textContent=P.name;
      document.getElementById('avR').textContent=P.avatar;
      addMsg(`👋 Hola, ${P.name}!`);
      if(mp&&MP.active) MP.myId=myUserId;
    }
  });
  Arcadia.onSaveReq(scheduleSave);

  // Start audio
  Audio.init();
  Audio.resume();
  Audio.startMusic();

  if(!running){running=true;last=performance.now();requestAnimationFrame(loop);}
}

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
let running=false, last=0;
function loop(ts){
  if(!running) return;
  const dt=Math.min(ts-last,50); last=ts;
  moveP(dt);
  survTick(dt);
  updateCam();
  if(MP.active) MP.tick(dt);
  renderBG();
  renderWorld();
  renderEntities();
  renderLight();
  renderFX(dt);
  renderMinimap(dt);
  updateHUD();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
//  INTRO LEAVES
// ════════════════════════════════════════════════════════
const ems=['🍃','🍂','🌿','🌱','🍀','🌾','🍁'];
const lvsEl=document.getElementById('iLvs');
for(let i=0;i<18;i++){
  const l=document.createElement('div'); l.className='il';
  l.textContent=ems[Math.floor(Math.random()*ems.length)];
  l.style.cssText=`left:${Math.random()*100}%;font-size:${1.1+Math.random()*1.6}rem;animation-duration:${7+Math.random()*11}s;animation-delay:${-Math.random()*11}s`;
  lvsEl.appendChild(l);
}

// Start preview generation on load
window.addEventListener('load',()=>{
  setTimeout(()=>{
    if(document.getElementById('pvC')) drawPv();
  },100);
});
</script>
